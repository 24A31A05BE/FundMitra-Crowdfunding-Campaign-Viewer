<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Login - FundMitra</title>

    <link href="https://fonts.googleapis.com/icon?family=Material+Icons" rel="stylesheet">
    <link rel="stylesheet" href="css/login.css">
	<link rel="stylesheet" href="css/global.css">
</head>
<body>

    <div class="login-card">

		<div class="logo">
			<img src="images/logo2.png" class="logo-img">
			<div class="logo-box"></div>
			<h2>FundMitra</h2>
		</div>

        <!-- TABS -->
        <div class="tabs">
            <button id="tab-login" class="active" onclick="switchTab('login')">Login</button>
            <button id="tab-signup" onclick="switchTab('signup')">Sign Up</button>
        </div>

        <!-- LOGIN -->
        <div id="login-section" class="section active">
            <input type="text" id="login-username" placeholder="Username">
            <p class="error" id="login-user-error"></p>

            <div class="password-box">
                <input type="password" id="login-password" placeholder="Password">
                <span class="material-icons eye" onclick="togglePassword('login-password', this)">
                    visibility
                </span>
            </div>
            <p class="error" id="login-pass-error"></p>

            <button onclick="loginUser()">Login</button>
        </div>

        <!-- SIGNUP STEP 1 -->
        <div id="signup-step1" class="section">
            <input type="text" id="name" placeholder="Full Name">
            <input type="email" id="email" placeholder="Email">
            <p class="error" id="email-error"></p>

			<input type="text" id="contact" placeholder="Contact Number (optional)">
			<input type="text" id="location" placeholder="Location (optional)">

            <button onclick="nextSignup()">Continue</button>
        </div>

        <!-- SIGNUP STEP 2 -->
        <div id="signup-step2" class="section">
            <input type="text" id="new-username" placeholder="Username">
			<p class="error" id="username-error"></p>

            <input type="password" id="new-password" placeholder="Password">
            <p class="error" id="password-error"></p>

            <input type="password" id="confirm-password" placeholder="Confirm Password">
            <p class="error" id="confirm-error"></p>

            <button onclick="createAccount()">Create Account</button>
            <button class="back" onclick="backToSignup()">Back</button>
        </div>

    </div>

    <script src="js/login.js"></script>
	<script src="js/data.js"></script>
</body>
</html>
